<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kuromi AR Thrower</title>
    
    <!-- Core WebXR & AR Libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      /* Force full viewport coverage on mobile devices */
      html, body {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
      }
      
      /* Target camera video element directly */
      #arjs-video, video {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
      }

      /* Aiming Crosshair */
      #reticle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        margin-top: -10px;
        margin-left: -10px;
        border: 2px solid #ff69b4;
        border-radius: 50%;
        z-index: 999999;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div id="reticle"></div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    >
      <a-assets>
        <!-- Ensure file name matches your model exactly -->
        <a-asset-item id="kuromiModel" src="kuromi.glb"></a-asset-item>
      </a-assets>

      <a-camera id="mainCamera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="world"></a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const cameraEntity = document.getElementById('mainCamera');
      const world = document.getElementById('world');

      function throwKuromi() {
        // Create new Kuromi object entity
        const model = document.createElement('a-entity');
        model.setAttribute('gltf-model', '#kuromiModel');
        model.setAttribute('scale', '0.2 0.2 0.2');

        // Extract camera matrix position and orientation
        const cameraThree = cameraEntity.getObject3D('camera');
        const pos = new THREE.Vector3();
        const dir = new THREE.Vector3();

        cameraThree.getWorldPosition(pos);
        cameraThree.getWorldDirection(dir);

        // Set starting position slightly ahead of the phone lens
        const startX = pos.x - dir.x * 0.3;
        const startY = pos.y - dir.y * 0.3;
        const startZ = pos.z - dir.z * 0.3;

        model.setAttribute('position', `${startX} ${startY} ${startZ}`);
        world.appendChild(model);

        // Project model target 4 units forward along direction vector
        const targetX = pos.x - dir.x * 4;
        const targetY = pos.y - dir.y * 4 - 0.5; // slight gravity drop
        const targetZ = pos.z - dir.z * 4;

        // Perform smooth throw animation
        model.setAttribute('animation', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: 600,
          easing: 'easeOutCubic'
        });
      }

      // Capture taps anywhere on the screen
      window.addEventListener('pointerdown', (e) => {
        throwKuromi();
      });
    </script>
  </body>
</html>
