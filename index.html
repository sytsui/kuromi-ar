<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuromi AR Game</title>
    <!-- Google's Native Model Viewer WebAR Library -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #121212;
        font-family: sans-serif;
        color: white;
      }
      model-viewer {
        width: 100%;
        height: 80%;
      }
      .ar-button {
        background-color: #ff69b4;
        color: white;
        border: none;
        border-radius: 30px;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>

    <h2>Kuromi AR Experience</h2>

    <!-- Model Viewer handles native device camera & AR placement automatically -->
    <model-viewer
      src="kuromi.glb"
      alt="Kuromi 3D Model"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1">
      
      <button slot="ar-button" class="ar-button">
        🌸 Launch AR Camera
      </button>
      
    </model-viewer>

    <p style="font-size: 14px; opacity: 0.8;">Tap the pink button to place Kuromi in your room!</p>

  </body>
</html>
