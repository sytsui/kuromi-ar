<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuromi AR Game</title>
    <!-- Google's Native Model Viewer Library -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #121212;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: white;
      }
      model-viewer {
        width: 90vw;
        height: 75vh;
        --postfix-bg: #1e1e1e;
      }
      .ar-button {
        background-color: #ff69b4;
        color: white;
        border: none;
        border-radius: 25px;
        padding: 16px 32px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
      }
      .instructions {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.8;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <h2>Kuromi AR</h2>

    <!-- Configured specifically for iOS Safari Quick Look -->

    <!-- <model-viewer
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
      ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
      alt="Astronaut Model"
      ar
      ar-modes="quick-look scene-viewer webxr"
      camera-controls>
      
      <button slot="ar-button" class="ar-button">
        📱 View Astronaut in AR
      </button>
      
    </model-viewer> -->

    <model-viewer
      src="kuromi.glb"
      ios-src="Kuromi.usdz"
      alt="Kuromi 3D Model"
      ar
      ar-modes="quick-look scene-viewer webxr"
      camera-controls
      auto-rotate
      shadow-intensity="1">
    
      <button slot="ar-button" class="ar-button">
        📱 View Kuromi in AR
      </button>
    
    </model-viewer>

    <p class="instructions">Open this page in <b>Safari</b> on your iPhone!</p>

  </body>
</html>
