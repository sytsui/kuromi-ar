<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kuromi AR Thrower</title>
    
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
      /* Force the viewport to fill 100% of the mobile screen */
      html, body {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
      }

      /* Force A-Frame canvas to full screen */
      .a-canvas {
        width: 100vw !important;
        height: 100vh !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
      }

      /* Transparent Full-Screen Touch Layer */
      #touch-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 99999;
        background: transparent;
      }

      /* Aiming Crosshair */
      #reticle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 24px;
        height: 24px;
        margin-top: -12px;
        margin-left: -12px;
        border: 3px solid #ff69b4;
        border-radius: 50%;
        z-index: 100000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <!-- Fullscreen Touch Trigger Layer -->
    <div id="touch-overlay"></div>
    <div id="reticle"></div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true;"
    >
      <a-assets>
        <a-asset-item id="kuromiModel" src="kuromi.glb"></a-asset-item>
      </a-assets>

      <a-camera id="mainCamera" position="0 1.6 0" look-controls="enabled: true"></a-camera>

      <a-entity id="world"></a-entity>
    </a-scene>

    <script>
      const cameraEntity = document.getElementById('mainCamera');
      const world = document.getElementById('world');
      const touchOverlay = document.getElementById('touch-overlay');

      function throwKuromi() {
        // Create new Kuromi entity
        const model = document.createElement('a-entity');
        model.setAttribute('gltf-model', '#kuromiModel');
        model.setAttribute('scale', '0.3 0.3 0.3');

        // Extract camera position and direction vector from Three.js camera
        const cameraThree = cameraEntity.getObject3D('camera');
        const pos = new THREE.Vector3();
        const dir = new THREE.Vector3();

        cameraThree.getWorldPosition(pos);
        cameraThree.getWorldDirection(dir);

        // Place model starting position in front of phone
        const startX = pos.x - dir.x * 0.5;
        const startY = pos.y - dir.y * 0.5;
        const startZ = pos.z - dir.z * 0.5;

        model.setAttribute('position', `${startX} ${startY} ${startZ}`);
        world.appendChild(model);

        // Target coordinates 5 meters forward
        const targetX = pos.x - dir.x * 5;
        const targetY = pos.y - dir.y * 5 - 0.8; // gravity arc drop
        const targetZ = pos.z - dir.z * 5;

        // Perform throwing animation
        model.setAttribute('animation', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: 600,
          easing: 'easeOutCubic'
        });
      }

      // Explicit touch listener attached directly to touch overlay element
      touchOverlay.addEventListener('touchstart', (e) => {
        e.preventDefault();
        throwKuromi();
      });

      touchOverlay.addEventListener('click', (e) => {
        throwKuromi();
      });
    </script>
  </body>
</html>
