<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kuromi Thrower Game</title>
    <!-- A-Frame Framework for WebXR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        margin-left: -10px;
        margin-top: -10px;
        border: 2px solid #ff69b4;
        border-radius: 50%;
        pointer-events: none;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <!-- Crosshair indicator on screen -->
    <div id="crosshair"></div>

    <a-scene
      webxr="optionalFeatures: hit-test, local-floor;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true;"
    >
      <!-- Load Kuromi Model -->
      <a-assets>
        <a-asset-item id="kuromiModel" src="kuromi.glb"></a-asset-item>
      </a-assets>

      <!-- Camera Rig -->
      <a-entity id="cameraRig">
        <a-camera id="camera" position="0 1.6 0" look-controls></a-camera>
      </a-entity>

      <!-- Container where thrown Kuromis will be spawned -->
      <a-entity id="kuromiContainer"></a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const camera = document.getElementById('camera');
      const container = document.getElementById('kuromiContainer');

      // Function to throw a Kuromi on screen tap
      function throwKuromi() {
        // Create new Kuromi entity
        const newKuromi = document.createElement('a-entity');
        newKuromi.setAttribute('gltf-model', '#kuromiModel');
        newKuromi.setAttribute('scale', '0.2 0.2 0.2');

        // Get current camera position and direction vector
        const cameraThree = camera.getObject3D('camera');
        const position = new THREE.Vector3();
        const direction = new THREE.Vector3();

        cameraThree.getWorldPosition(position);
        cameraThree.getWorldDirection(direction);

        // Position model slightly in front of the camera
        newKuromi.setAttribute('position', {
          x: position.x - direction.x * 0.5,
          y: position.y - direction.y * 0.5,
          z: position.z - direction.z * 0.5
        });

        container.appendChild(newKuromi);

        // Animate the throw forward
        const targetX = position.x - direction.x * 4;
        const targetY = position.y - direction.y * 4 - 0.5; // Slight arc down for gravity effect
        const targetZ = position.z - direction.z * 4;

        newKuromi.setAttribute('animation', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: 600,
          easing: 'easeOutQuad'
        });
      }

      // Listen for screen tap anywhere
      window.addEventListener('touchstart', (e) => {
        // Prevent default touch behaviors
        if (e.touches.length === 1) {
          throwKuromi();
        }
      });
    </script>
  </body>
</html>
