<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-xr-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: rgba(0, 0, 0, 0.8); z-index: 999; color: white; font-family: sans-serif;
      }
      #start-btn {
        padding: 15px 30px; font-size: 18px; font-weight: bold; background: #ff69b4;
        color: white; border: none; border-radius: 25px; cursor: pointer; margin-top: 15px;
      }
      #instructions {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
        border-radius: 20px; font-family: sans-serif; pointer-events: none; text-align: center; display: none;
      }
    </style>
  </head>
  <body>

    <!-- Start Overlay -->
    <div id="overlay">
      <h2>Kuromi AR Game</h2>
      <button id="start-btn">Start AR Game</button>
    </div>

    <div id="instructions">Scan the floor, then tap to place Kuromi!</div>

    <!-- AR Scene (Kept paused until button is clicked) -->
    <a-scene mindar-xr="type: world; autoStart: false" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="kuromiModel" src="kuromi.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse"></a-camera>

      <a-entity mindar-xr-anchor="type: surface">
        <a-plane id="ground" class="clickable" visible="false" scale="100 100 1" rotation="-90 0 0"></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector('#start-btn');
      const overlay = document.querySelector('#overlay');
      const instructions = document.querySelector('#instructions');
      const sceneEl = document.querySelector('a-scene');

      // Tapping the button explicitly forces the browser to request camera access
      startBtn.addEventListener('click', () => {
        overlay.style.display = 'none';
        instructions.style.display = 'block';
        
        // Start the AR system
        const arSystem = sceneEl.systems['mindar-xr-system'];
        arSystem.start();
      });

      const ground = document.querySelector('#ground');
      ground.addEventListener('click', (event) => {
        const intersectionPoint = event.detail.intersection.point;
        const newKuromi = document.createElement('a-entity');
        newKuromi.setAttribute('gltf-model', '#kuromiModel');
        newKuromi.setAttribute('position', intersectionPoint);
        newKuromi.setAttribute('scale', '0.2 0.2 0.2');
        sceneEl.appendChild(newKuromi);
      });
    </script>
  </body>
</html>
