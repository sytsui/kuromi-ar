<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kuromi Thrower Game</title>
    
    <!-- A-Frame and MindAR Libraries -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 24px;
        height: 24px;
        margin-left: -12px;
        margin-top: -12px;
        border: 3px solid #ff69b4;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <!-- Aiming Reticle -->
    <div id="crosshair"></div>

    <a-scene 
      mindar-image="uiScanning: no;" 
      color-space="sRGB" 
      embedded 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: true">
      
      <a-assets>
        <!-- Specify your model file name here -->
        <a-asset-item id="kuromiModel" src="kuromi.glb"></a-asset-item>
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: true"></a-camera>

      <!-- Container where thrown models spawn -->
      <a-entity id="kuromiContainer"></a-entity>
    </a-scene>

    <script>
      const camera = document.getElementById('camera');
      const container = document.getElementById('kuromiContainer');

      function throwKuromi() {
        const newKuromi = document.createElement('a-entity');
        newKuromi.setAttribute('gltf-model', '#kuromiModel');
        newKuromi.setAttribute('scale', '0.15 0.15 0.15');

        // Grab current camera position and direction vector
        const cameraThree = camera.getObject3D('camera');
        const position = new THREE.Vector3();
        const direction = new THREE.Vector3();

        cameraThree.getWorldPosition(position);
        cameraThree.getWorldDirection(direction);

        // Place new Kuromi slightly in front of camera lens
        const startX = position.x - direction.x * 0.4;
        const startY = position.y - direction.y * 0.4;
        const startZ = position.z - direction.z * 0.4;

        newKuromi.setAttribute('position', `${startX} ${startY} ${startZ}`);
        container.appendChild(newKuromi);

        // Calculate throwing trajectory
        const targetX = position.x - direction.x * 3;
        const targetY = position.y - direction.y * 3 - 0.4; // Arc downward
        const targetZ = position.z - direction.z * 3;

        newKuromi.setAttribute('animation', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: 500,
          easing: 'easeOutQuad'
        });
      }

      // Listen for touch taps on screen
      window.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          throwKuromi();
        }
      });
    </script>
  </body>
</html>
